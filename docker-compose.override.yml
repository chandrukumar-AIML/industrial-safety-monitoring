# docker-compose.override.yml
# Auto-merged by `docker compose up` in development.
# Adds: pgAdmin UI, hot-reload, relaxed resource limits.
#
# To use production config only:
#   docker compose -f docker-compose.yml up

services:
  backend:
    volumes:
      - ./inference:/app/inference
      - ./backend:/app/backend
      - ./models:/app/models
      - chroma_data:/app/rag/chroma_db
    environment:
      - APP_ENV=development
      - LOG_LEVEL=DEBUG
      - DEMO_MODE=${DEMO_MODE:-true}   # demo on by default in dev
    command: >
      uvicorn backend.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir backend
      --reload-dir inference
      --log-level debug
    deploy:
      resources:
        limits:
          memory: 8g

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    command: npm run dev -- --host 0.0.0.0
    deploy:
      resources:
        limits:
          memory: 2g

  # pgAdmin — PostgreSQL web UI (dev only)
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: safety-pgadmin
    restart: unless-stopped
    networks:
      - safety-net
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@safety.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - ./docker/pgadmin-servers.json:/pgadmin4/servers.json:ro
    mem_limit: 256m
    depends_on:
      postgres:
        condition: service_healthy
