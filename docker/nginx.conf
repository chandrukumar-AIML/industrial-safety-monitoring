# docker/nginx.conf
# Backend hostname is injected at runtime via BACKEND_HOST env var
# (docker-compose: "backend", Railway: "backend.railway.internal")
# Default: "backend" for local compose compatibility.

# Security: Disable nginx version in headers
server_tokens off;

server {
    listen 80;
    server_name _;

    # ── Security headers ──────────────────────────────────────
    # CHANGED: basic security headers were missing from production config
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "SAMEORIGIN"      always;
    add_header X-XSS-Protection        "1; mode=block"   always;
    add_header Referrer-Policy         "strict-origin"   always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss: http: https:; font-src 'self';" always;

    # ── Gzip ─────────────────────────────────────────────────
    gzip            on;
    # CHANGED: added compression level — default (1) is too low for text
    gzip_comp_level 5;
    gzip_types      text/plain
                    text/css
                    application/javascript
                    application/json
                    image/svg+xml;
    gzip_min_length 1024;

    # ── SPA ───────────────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── REST API proxy ────────────────────────────────────────
    location /api/ {
        # BACKEND_HOST is set in Dockerfile CMD via envsubst
        # local compose: backend   Railway: backend.railway.internal
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        # CHANGED: return SPA on backend 502/503 so user sees app, not
        # Nginx default error page
        proxy_intercept_errors on;
        error_page 502 503 504 /index.html;
    }

    # ── WebSocket proxy ───────────────────────────────────────
    location /stream {
        proxy_pass         http://backend:8000/stream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        # CHANGED: proxy_buffering must be off for WebSocket —
        # buffering an upgraded connection causes silent frame drops
        proxy_buffering    off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── MLflow proxy ──────────────────────────────────────────
    location /mlflow/ {
        proxy_pass        http://mlflow:5000/;
        proxy_set_header  Host $host;
        proxy_read_timeout 60s;
    }

    # ── Static asset caching ──────────────────────────────────
    # Vite output includes content hashes in filenames — safe to cache forever
    location ~* \.(js|css|png|jpg|svg|woff2)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        try_files   $uri =404;
    }

    # ── Health check ──────────────────────────────────────────
    location = /health.txt {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}